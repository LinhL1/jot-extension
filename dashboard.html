<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReadMark - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        .auth-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
        }

        .auth-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #333;
        }

        .auth-subtitle {
            font-size: 14px;
            color: #999;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            margin-top: 8px;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .toggle-auth {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #999;
        }

        .toggle-auth button {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-weight: 600;
            text-decoration: underline;
        }

        .error-message {
            padding: 12px;
            background: #ffebee;
            color: #c62828;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
        }

        .success-message {
            padding: 12px;
            background: #e8f5e9;
            color: #2e7d32;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
        }

        /* Dashboard */
        .dashboard {
            min-height: 100vh;
            padding: 24px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            background: white;
            padding: 20px 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .header-title {
            font-size: 24px;
            font-weight: 700;
        }

        .header-user {
            font-size: 13px;
            color: #999;
        }

        .btn-logout {
            background: #f0f0f0;
            color: #333;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            background: #e0e0e0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
            display: block;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 13px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .content {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 24px;
        }

        .tabs {
            display: flex;
            gap: 16px;
            border-bottom: 2px solid #f0f0f0;
            margin-bottom: 24px;
        }

        .tab {
            padding: 12px 16px;
            background: none;
            border: none;
            font-size: 14px;
            font-weight: 500;
            color: #999;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab:hover {
            color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .search-box {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .search-box:focus {
            outline: none;
            border-color: #667eea;
        }

        .highlights-list {
            display: grid;
            gap: 16px;
        }

        .highlight-card {
            padding: 16px;
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            border-radius: 8px;
            break-inside: avoid;
        }

        .highlight-text {
            font-size: 14px;
            line-height: 1.6;
            color: #333;
            font-style: italic;
            margin-bottom: 12px;
            word-break: break-word;
        }

        .highlight-note {
            font-size: 13px;
            color: #666;
            background: white;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 12px;
        }

        .highlight-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .tag {
            display: inline-block;
            padding: 4px 8px;
            background: #667eea;
            color: white;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
        }

        .tag:hover {
            background: #5568d3;
        }

        .highlight-meta {
            font-size: 11px;
            color: #aaa;
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: #999;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .loading {
            text-align: center;
            padding: 24px;
            color: #999;
        }

        .filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .filter-btn {
            padding: 6px 12px;
            background: #f0f0f0;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            background: #e0e0e0;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 16px;
                align-items: flex-start;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .highlights-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="auth-screen" class="auth-screen" style="display: none;">
        <div class="auth-card">
            <div class="auth-title">📖 ReadMark</div>
            <div class="auth-subtitle">Your reading companion</div>
            
            <div id="error-message"></div>
            <div id="success-message"></div>

            <!-- Sign In Form -->
            <div id="signin-form">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="signin-email" class="form-input" placeholder="you@example.com">
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="signin-password" class="form-input" placeholder="••••••••">
                </div>

                <button class="btn btn-primary" id="signin-btn">Sign In</button>
                <button class="btn btn-secondary" id="toggle-signup">Create Account</button>
            </div>

            <!-- Sign Up Form -->
            <div id="signup-form" style="display: none;">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="signup-email" class="form-input" placeholder="you@example.com">
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="signup-password" class="form-input" placeholder="••••••••">
                </div>

                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" id="signup-confirm" class="form-input" placeholder="••••••••">
                </div>

                <button class="btn btn-primary" id="signup-btn">Create Account</button>
                <button class="btn btn-secondary" id="toggle-signin">Sign In Instead</button>
            </div>
        </div>
    </div>

    <div id="dashboard" style="display: none;">
        <div class="header">
            <div>
                <div class="header-title">Jot</div>
                <div class="header-user">Welcome, <span id="user-email">User</span></div>
            </div>
            <button class="btn-logout" id="logout-btn">Sign Out</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-number" id="total-highlights">0</span>
                <span class="stat-label">Total Highlights</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="total-tags">0</span>
                <span class="stat-label">Unique Tags</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="total-sources">0</span>
                <span class="stat-label">Sources</span>
            </div>
        </div>

        <div class="content">
            <div class="tabs">
                <button class="tab active" data-tab="all">All Highlights</button>
                <button class="tab" data-tab="tags">By Tags</button>
                <button class="tab" data-tab="sources">By Source</button>
            </div>

            <!-- All Highlights Tab -->
            <div id="all-tab" class="tab-content active">
                <input type="text" id="search-highlights" class="search-box" placeholder="Search your highlights...">
                <div id="highlights-container" class="highlights-list">
                    <div class="loading">Loading highlights...</div>
                </div>
            </div>

            <!-- Tags Tab -->
            <div id="tags-tab" class="tab-content">
                <div id="tags-container">
                    <div class="loading">Loading tags...</div>
                </div>
            </div>

            <!-- Sources Tab -->
            <div id="sources-tab" class="tab-content">
                <div id="sources-container">
                    <div class="loading">Loading sources...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js"></script>

    <script>
        // IMPORTANT: Replace with YOUR Firebase config
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY_HERE",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let allHighlights = [];

        // Auth State Handler
        auth.onAuthStateChanged((user) => {
            if (user) {
                showDashboard(user);
                loadHighlights(user);
            } else {
                showAuthScreen();
            }
        });

        // Sign In
        document.getElementById('signin-btn').addEventListener('click', () => {
            const email = document.getElementById('signin-email').value;
            const password = document.getElementById('signin-password').value;

            if (!email || !password) {
                showError('Please fill in all fields');
                return;
            }

            auth.signInWithEmailAndPassword(email, password)
                .catch(error => showError(error.message));
        });

        // Sign Up
        document.getElementById('signup-btn').addEventListener('click', () => {
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;

            if (!email || !password || !confirm) {
                showError('Please fill in all fields');
                return;
            }

            if (password !== confirm) {
                showError('Passwords do not match');
                return;
            }

            auth.createUserWithEmailAndPassword(email, password)
                .then(() => {
                    showSuccess('Account created! Redirecting...');
                })
                .catch(error => showError(error.message));
        });

        // Toggle Auth Forms
        document.getElementById('toggle-signup').addEventListener('click', () => {
            document.getElementById('signin-form').style.display = 'none';
            document.getElementById('signup-form').style.display = 'block';
        });

        document.getElementById('toggle-signin').addEventListener('click', () => {
            document.getElementById('signup-form').style.display = 'none';
            document.getElementById('signin-form').style.display = 'block';
        });

        // Log Out
        document.getElementById('logout-btn').addEventListener('click', () => {
            auth.signOut();
        });

        // Show/Hide Screens
        function showAuthScreen() {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
        }

        function showDashboard(user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('user-email').textContent = user.email;
        }

        // Load Highlights from Firestore
        async function loadHighlights(user) {
            try {
                const snapshot = await db.collection('users').doc(user.uid).collection('highlights').orderBy('timestamp', 'desc').get();
                allHighlights = snapshot.docs.map(doc => doc.data());

                updateStats();
                displayHighlights(allHighlights);
                displayTags();
                displaySources();
            } catch (error) {
                showError('Error loading highlights: ' + error.message);
            }
        }

        // Display Highlights
        function displayHighlights(highlights) {
            const container = document.getElementById('highlights-container');

            if (highlights.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon"></div><p>No highlights yet. Start highlighting in the extension!</p></div>';
                return;
            }

            container.innerHTML = highlights.map(h => `
                <div class="highlight-card">
                    <div class="highlight-text">"${h.text}"</div>
                    ${h.note ? `<div class="highlight-note"><strong>Note:</strong> ${h.note}</div>` : ''}
                    ${h.tags && h.tags.length > 0 ? `
                        <div class="highlight-tags">
                            ${h.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                    ` : ''}
                    <div class="highlight-meta">
                        ${new URL(h.url).hostname} • ${new Date(h.timestamp).toLocaleDateString()}
                    </div>
                </div>
            `).join('');
        }

        // Display Tags
        function displayTags() {
            const tagsMap = {};
            allHighlights.forEach(h => {
                if (h.tags) {
                    h.tags.forEach(tag => {
                        tagsMap[tag] = (tagsMap[tag] || 0) + 1;
                    });
                }
            });

            const container = document.getElementById('tags-container');
            const tags = Object.entries(tagsMap).sort((a, b) => b[1] - a[1]);

            if (tags.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No tags yet</p></div>';
                return;
            }

            container.innerHTML = `
                <div class="filters">
                    ${tags.map(([tag, count]) => `
                        <button class="filter-btn" onclick="filterByTag('${tag}')">
                            ${tag} (${count})
                        </button>
                    `).join('')}
                </div>
            `;
        }

        // Display Sources
        function displaySources() {
            const sourcesMap = {};
            allHighlights.forEach(h => {
                const domain = new URL(h.url).hostname;
                sourcesMap[domain] = (sourcesMap[domain] || 0) + 1;
            });

            const container = document.getElementById('sources-container');
            const sources = Object.entries(sourcesMap).sort((a, b) => b[1] - a[1]);

            if (sources.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No sources yet</p></div>';
                return;
            }

            container.innerHTML = `
                <div class="filters">
                    ${sources.map(([source, count]) => `
                        <button class="filter-btn" onclick="filterBySource('${source}')">
                            ${source} (${count})
                        </button>
                    `).join('')}
                </div>
            `;
        }

        // Filter Functions
        function filterByTag(tag) {
            const filtered = allHighlights.filter(h => h.tags && h.tags.includes(tag));
            displayHighlights(filtered);
        }

        function filterBySource(source) {
            const filtered = allHighlights.filter(h => new URL(h.url).hostname === source);
            displayHighlights(filtered);
        }

        // Search
        document.getElementById('search-highlights').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allHighlights.filter(h =>
                h.text.toLowerCase().includes(query) ||
                (h.note && h.note.toLowerCase().includes(query)) ||
                (h.tags && h.tags.some(tag => tag.toLowerCase().includes(query)))
            );
            displayHighlights(filtered);
        });

        // Tab Switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                const tabId = tab.getAttribute('data-tab') + '-tab';
                document.getElementById(tabId).classList.add('active');
            });
        });

        // Update Stats
        function updateStats() {
            document.getElementById('total-highlights').textContent = allHighlights.length;

            const tagsSet = new Set();
            allHighlights.forEach(h => {
                if (h.tags) h.tags.forEach(tag => tagsSet.add(tag));
            });
            document.getElementById('total-tags').textContent = tagsSet.size;

            const sourcesSet = new Set();
            allHighlights.forEach(h => sourcesSet.add(new URL(h.url).hostname));
            document.getElementById('total-sources').textContent = sourcesSet.size;
        }

        // Messages
        function showError(msg) {
            const el = document.getElementById('error-message');
            el.innerHTML = `<div class="error-message">${msg}</div>`;
            setTimeout(() => el.innerHTML = '', 5000);
        }

        function showSuccess(msg) {
            const el = document.getElementById('success-message');
            el.innerHTML = `<div class="success-message">${msg}</div>`;
            setTimeout(() => el.innerHTML = '', 5000);
        }
    </script>
</body>
</html>
